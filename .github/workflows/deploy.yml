name: Deploy to Netlify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        run: |
          zip -r site.zip . -x ".git/*" ".github/*"
          curl -s -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @site.zip \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Deploy: {d.get(\"state\",\"?\")}')"
